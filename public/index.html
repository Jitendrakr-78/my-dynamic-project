<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dynamic Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Live Dynamic Project</h2>
        
        <div class="form-group">
            <input type="text" id="field1" placeholder="Enter Field 1 Data">
            <input type="text" id="field2" placeholder="Enter Field 2 Data">
        </div>

        <div class="btn-group">
            <button id="saveBtn">Save Data</button>
            <button id="showBtn">Show Data</button>
        </div>

        <h3>Stored Data:</h3>
        <div id="dataDisplay" class="data-display">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
